<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FindMyPhone — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #13161d;
      --surface2: #1a1e28;
      --border: #1e2330;
      --accent: #3b82f6;
      --text: #e8eaf0;
      --muted: #6b7280;
      --online: #22c55e;
      --offline: #6b7280;
      --danger: #ef4444;
      --warning: #f59e0b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* TOPBAR */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      height: 52px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 100;
    }

    .topbar-left { display: flex; align-items: center; gap: 12px; }

    .logo {
      font-family: 'Space Mono', monospace;
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }
    .logo span { color: var(--accent); }

    .stats { display: flex; align-items: center; gap: 8px; }

    .stat-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }

    .stat-online { background: rgba(34,197,94,0.12); color: #4ade80; }
    .stat-offline { background: rgba(107,114,128,0.15); color: var(--muted); }

    .dot-pulse {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--online);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .topbar-right { display: flex; align-items: center; gap: 8px; }

    .btn-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 16px;
      transition: all 0.15s;
    }
    .btn-icon:hover { border-color: var(--accent); color: var(--text); }

    .btn-add {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid var(--accent);
      background: rgba(59,130,246,0.1);
      color: var(--accent);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-add:hover { background: rgba(59,130,246,0.2); }

    /* MAIN LAYOUT */
    .main {
      display: grid;
      grid-template-columns: 260px 1fr;
      flex: 1;
      overflow: hidden;
    }

    /* SIDEBAR */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .device-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .device-list::-webkit-scrollbar { width: 4px; }
    .device-list::-webkit-scrollbar-track { background: transparent; }
    .device-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .device-card {
      border-radius: 10px;
      padding: 10px 12px;
      border: 1px solid transparent;
      cursor: pointer;
      margin-bottom: 4px;
      transition: all 0.15s;
      background: var(--surface2);
    }

    .device-card:hover { border-color: var(--border); }
    .device-card.active { border-color: var(--accent); background: rgba(59,130,246,0.08); }

    .device-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 7px;
    }

    .device-avatar {
      width: 30px; height: 30px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .device-info { flex: 1; min-width: 0; }

    .device-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .device-model {
      font-size: 11px;
      color: var(--muted);
    }

    .device-meta {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--muted);
    }

    .status-online { color: var(--online); font-weight: 500; }
    .status-offline { color: var(--offline); }

    .device-actions {
      display: flex;
      gap: 4px;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }

    .btn-small {
      flex: 1;
      padding: 5px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
    }
    .btn-small:hover { border-color: var(--accent); color: var(--accent); }

    .empty-state {
      padding: 24px 16px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    /* MAP */
    .map-container { position: relative; }

    #map {
      width: 100%;
      height: 100%;
      background: #0d1117;
    }

    /* Leaflet dark override */
    .leaflet-tile-pane { filter: brightness(0.85) saturate(0.8); }
    .leaflet-container { font-family: 'DM Sans', sans-serif; }
    .leaflet-popup-content-wrapper {
      background: var(--surface) !important;
      border: 1px solid var(--border) !important;
      border-radius: 12px !important;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4) !important;
      color: var(--text) !important;
    }
    .leaflet-popup-tip { background: var(--surface) !important; }
    .leaflet-popup-content { margin: 12px 16px !important; }

    /* Map controls overlay */
    .map-overlay {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .map-btn {
      width: 34px; height: 34px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 16px;
      color: var(--muted);
      transition: all 0.15s;
    }
    .map-btn:hover { border-color: var(--accent); color: var(--text); }

    /* Info bar bottom */
    .info-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: rgba(19,22,29,0.92);
      backdrop-filter: blur(8px);
      border-top: 1px solid var(--border);
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 20px;
      z-index: 1000;
      font-size: 12px;
      color: var(--muted);
    }

    .info-item { display: flex; align-items: center; gap: 5px; }
    .info-item strong { color: var(--text); font-weight: 500; }
    .info-item.ml { margin-left: auto; }

    /* Toast notifikasi */
    .toast-container {
      position: fixed;
      top: 64px;
      right: 16px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--text);
      min-width: 240px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
      animation: slideIn 0.2s ease;
    }

    .toast.online { border-left: 3px solid var(--online); }
    .toast.offline { border-left: 3px solid var(--danger); }

    @keyframes slideIn {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* Loading */
    .loading {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 12px;
      z-index: 9999;
    }

    .spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Custom marker */
    .custom-marker {
      width: 32px; height: 32px;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      border: 2px solid white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    .marker-offline { filter: grayscale(1) brightness(0.6); }

    /* Popup content */
    .popup-name { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
    .popup-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .popup-row span:last-child { color: var(--text); font-weight: 500; }
    .popup-link { display: block; margin-top: 10px; font-size: 12px; color: var(--accent); text-decoration: none; }
    .popup-link:hover { text-decoration: underline; }

    /* RESPONSIVE MOBILE */
    @media (max-width: 640px) {
      .main {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr auto;
      }

      .sidebar {
        order: 2;
        border-right: none;
        border-top: 1px solid var(--border);
        max-height: 35vh;
      }

      .map-container {
        order: 1;
      }

      .topbar-right .btn-add span { display: none; }

      .stats { display: none; }
    }
  </style>
</head>
<body>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <div style="font-size:13px; color:var(--muted)">Memuat dashboard...</div>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <div class="logo">Find<span>My</span>Phone</div>
    <div class="stats">
      <div class="stat-badge stat-online">
        <div class="dot-pulse"></div>
        <span id="count-online">0</span> online
      </div>
      <div class="stat-badge stat-offline">
        <span id="count-offline">0</span> offline
      </div>
    </div>
  </div>
  <div class="topbar-right">
    <button class="btn-icon" onclick="focusAll()" title="Lihat semua HP">🗺️</button>
    <button class="btn-icon" onclick="window.location.href='pengaturan.html'" title="Pengaturan">⚙️</button>
    <button class="btn-icon" onclick="handleLogout()" title="Logout">🚪</button>
    <button class="btn-add" onclick="window.location.href='tambah.html'">+ Tambah HP</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">Perangkat saya</div>
    <div class="device-list" id="device-list">
      <div class="empty-state" id="empty-state">
        Belum ada HP terdaftar.<br>Klik <strong>+ Tambah HP</strong> untuk mulai.
      </div>
    </div>
  </div>

  <!-- MAP -->
  <div class="map-container">
    <div id="map"></div>

    <div class="map-overlay">
      <div class="map-btn" onclick="focusAll()" title="Lihat semua">🎯</div>
      <div class="map-btn" onclick="toggleSatellite()" title="Satelit">🛰️</div>
    </div>

    <div class="info-bar">
      <div class="info-item">📱 <strong id="bar-total">0</strong> perangkat</div>
      <div class="info-item">🟢 <strong id="bar-online">0</strong> online</div>
      <div class="info-item">⚫ <strong id="bar-offline">0</strong> offline</div>
      <div class="info-item ml">🔄 Update tiap 5 detik</div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast-container" id="toast-container"></div>

<script>
  const SUPABASE_URL = 'https://slljvmlwdnyyaowcioso.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNsbGp2bWx3ZG55eWFvd2Npb3NvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NTE5NTQsImV4cCI6MjA5NjIyNzk1NH0.xMUpbkBZeVZWpMxBM1vifSzekScNJvmhaxAJrQEyG9k';
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let map, devices = {}, markers = {}, satelliteMode = false;
  let tileLayer, currentUser;

  const TILE_DARK = 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png';
  const TILE_SAT = 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}';

  // =====================
  // INIT
  // =====================
  async function init() {
    // Cek auth
    const { data: { session } } = await db.auth.getSession();
    if (!session) return window.location.href = '/index.html';
    currentUser = session.user;

    // Init peta
    map = L.map('map', { zoomControl: false }).setView([0.5335, 101.45], 12);
    tileLayer = L.tileLayer(TILE_DARK, {
      attribution: '© CartoDB © OpenStreetMap',
      maxZoom: 19
    }).addTo(map);

    L.control.zoom({ position: 'bottomright' }).addTo(map);

    // Load devices
    await loadDevices();

    // Subscribe realtime
    subscribeRealtime();

    // Cek offline devices tiap 5 menit
    fetch('/api/check-offline').catch(() => {});
    setInterval(() => fetch('/api/check-offline').catch(() => {}), 5 * 60 * 1000);

    document.getElementById('loading').style.display = 'none';
  }

  // =====================
  // LOAD DEVICES + LOKASI
  // =====================
  async function loadDevices() {
    const { data: devList } = await db
      .from('devices')
      .select('*')
      .eq('user_id', currentUser.id)
      .eq('aktif', true)
      .order('created_at', { ascending: true });

    if (!devList?.length) return;

    document.getElementById('empty-state').style.display = 'none';

    for (const dev of devList) {
      devices[dev.id] = { ...dev, online: false, lastLoc: null };

      // Ambil lokasi terakhir
      const { data: locs } = await db
        .from('locations')
        .select('*')
        .eq('device_id', dev.id)
        .order('timestamp', { ascending: false })
        .limit(1);

      if (locs?.length) {
        devices[dev.id].lastLoc = locs[0];
        const menit = Math.floor((Date.now() - new Date(locs[0].timestamp)) / 60000);
        devices[dev.id].online = menit < 2;
        addOrUpdateMarker(dev.id);
      }
    }

    renderSidebar();
    updateStats();
  }

  // =====================
  // MARKER
  // =====================
  function addOrUpdateMarker(deviceId) {
    const dev = devices[deviceId];
    if (!dev?.lastLoc) return;

    const { lat, lng } = dev.lastLoc;
    const color = dev.online ? dev.warna_marker : '#6b7280';

    const icon = L.divIcon({
      className: '',
      html: `<div class="custom-marker ${dev.online ? '' : 'marker-offline'}" style="background:${color}"></div>`,
      iconSize: [32, 32],
      iconAnchor: [16, 32],
      popupAnchor: [0, -36]
    });

    const popupHtml = buildPopup(dev);

    if (markers[deviceId]) {
      markers[deviceId].setLatLng([lat, lng]);
      markers[deviceId].setIcon(icon);
      markers[deviceId].setPopupContent(popupHtml);
    } else {
      markers[deviceId] = L.marker([lat, lng], { icon })
        .addTo(map)
        .bindPopup(popupHtml);
    }
  }

  function buildPopup(dev) {
    const loc = dev.lastLoc;
    if (!loc) return `<div class="popup-name">${dev.nama}</div><div style="font-size:12px;color:var(--muted)">Belum ada lokasi</div>`;

    const waktu = new Date(loc.timestamp).toLocaleString('id-ID');
    const menit = Math.floor((Date.now() - new Date(loc.timestamp)) / 60000);
    const status = dev.online ? '🟢 Online' : `⚫ Offline (${menit} menit lalu)`;
    const gmaps = `https://maps.google.com/?q=${loc.lat},${loc.lng}`;

    return `
      <div class="popup-name">📱 ${dev.nama}</div>
      <div class="popup-row"><span>Model</span><span>${dev.model || '-'}</span></div>
      <div class="popup-row"><span>Status</span><span>${status}</span></div>
      <div class="popup-row"><span>Baterai</span><span>${loc.battery ?? '?'}%</span></div>
      <div class="popup-row"><span>Akurasi</span><span>±${Math.round(loc.accuracy ?? 0)}m</span></div>
      <div class="popup-row"><span>Update</span><span>${waktu}</span></div>
      <a class="popup-link" href="${gmaps}" target="_blank">🗺️ Buka di Google Maps</a>
    `;
  }

  // =====================
  // SIDEBAR
  // =====================
  function renderSidebar() {
    const list = document.getElementById('device-list');
    const empty = document.getElementById('empty-state');

    const devArr = Object.values(devices);
    if (!devArr.length) { empty.style.display = 'block'; return; }
    empty.style.display = 'none';

    // Hapus semua card lama
    list.querySelectorAll('.device-card').forEach(el => el.remove());

    for (const dev of devArr) {
      const loc = dev.lastLoc;
      const menit = loc ? Math.floor((Date.now() - new Date(loc.timestamp)) / 60000) : null;
      const waktu = menit === null ? 'Belum ada data' : menit < 1 ? 'Baru saja' : `${menit} menit lalu`;

      const card = document.createElement('div');
      card.className = 'device-card';
      card.id = `card-${dev.id}`;
      card.innerHTML = `
        <div class="device-top">
          <div class="device-avatar" style="background:${dev.warna_marker}22; color:${dev.warna_marker}">📱</div>
          <div class="device-info">
            <div class="device-name">${dev.nama}</div>
            <div class="device-model">${dev.model || 'HP'}</div>
          </div>
        </div>
        <div class="device-meta">
          <span class="${dev.online ? 'status-online' : 'status-offline'}">${dev.online ? '● Online' : '● Offline'}</span>
          <span>🔋 ${loc?.battery ?? '?'}%</span>
          <span>⏱ ${waktu}</span>
        </div>
        <div class="device-actions">
          <button class="btn-small" onclick="focusDevice('${dev.id}')">🎯 Fokus</button>
          <button class="btn-small" onclick="window.location.href='riwayat.html?id=${dev.id}'">📍 Riwayat</button>
          <button class="btn-small" onclick="shareDevice('${dev.id}')">🔗 Share</button>
        </div>
      `;

      card.addEventListener('click', (e) => {
        if (e.target.tagName === 'BUTTON') return;
        focusDevice(dev.id);
        document.querySelectorAll('.device-card').forEach(c => c.classList.remove('active'));
        card.classList.add('active');
      });

      list.appendChild(card);
    }
  }

  // =====================
  // REALTIME SUBSCRIPTION
  // =====================
  function subscribeRealtime() {
    // Subscribe ke setiap device milik user (filtered)
    const deviceIds = Object.keys(devices);
    if (!deviceIds.length) return;

    for (const devId of deviceIds) {
      db.channel(`loc-${devId}`)
        .on('postgres_changes', {
          event: 'INSERT',
          schema: 'public',
          table: 'locations',
          filter: `device_id=eq.${devId}`
        }, (payload) => {
          const loc = payload.new;
          const dev = devices[loc.device_id];
          if (!dev) return;

          const wasOnline = dev.online;
          dev.lastLoc = loc;
          dev.online = true;
          devices[loc.device_id] = dev;

          addOrUpdateMarker(loc.device_id);
          renderSidebar();
          updateStats();

          if (!wasOnline) showToast(dev.nama, 'online');
        })
        .subscribe();
    }
  }

  // =====================
  // STATS
  // =====================
  function updateStats() {
    const devArr = Object.values(devices);
    const online = devArr.filter(d => d.online).length;
    const offline = devArr.length - online;

    document.getElementById('count-online').textContent = online;
    document.getElementById('count-offline').textContent = offline;
    document.getElementById('bar-total').textContent = devArr.length;
    document.getElementById('bar-online').textContent = online;
    document.getElementById('bar-offline').textContent = offline;
  }

  // =====================
  // UTILS
  // =====================
  function focusDevice(deviceId) {
    const dev = devices[deviceId];
    if (!dev?.lastLoc) return;
    map.flyTo([dev.lastLoc.lat, dev.lastLoc.lng], 16, { duration: 1 });
    markers[deviceId]?.openPopup();
  }

  function focusAll() {
    const locs = Object.values(devices).filter(d => d.lastLoc).map(d => [d.lastLoc.lat, d.lastLoc.lng]);
    if (!locs.length) return;
    if (locs.length === 1) { map.flyTo(locs[0], 15); return; }
    map.flyToBounds(L.latLngBounds(locs), { padding: [40, 40], duration: 1 });
  }

  function toggleSatellite() {
    satelliteMode = !satelliteMode;
    tileLayer.setUrl(satelliteMode ? TILE_SAT : TILE_DARK);
  }

  async function shareDevice(deviceId) {
    const dur = prompt('Durasi share (jam):\n1 = 1 jam\n8 = 8 jam\n24 = 1 hari\n0 = tanpa batas', '8');
    if (dur === null) return;

    const expired = dur > 0
      ? new Date(Date.now() + dur * 60 * 60 * 1000).toISOString()
      : null;

    const token = crypto.randomUUID();
    await db.from('invite_links').insert({
      device_id: deviceId,
      token,
      expired_at: expired,
      aktif: true
    });

    const link = `${window.location.origin}/share.html?token=${token}`;
    try {
      await navigator.clipboard.writeText(link);
      showToast('Link share disalin ke clipboard!', 'online');
    } catch (e) {
      prompt('Salin link ini:', link);
    }
  }

  function showToast(nama, type) {
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerHTML = `
      <span>${type === 'online' ? '🟢' : '🔴'}</span>
      <span><strong>${nama}</strong> ${type === 'online' ? 'kembali online' : 'offline'}</span>
    `;
    document.getElementById('toast-container').appendChild(toast);
    setTimeout(() => toast.remove(), 4000);
  }

  async function handleLogout() {
    await db.auth.signOut();
    window.location.href = '/index.html';
  }

  // Cek status offline tiap 2 menit (update marker jadi abu2)
  setInterval(() => {
    let changed = false;
    for (const id in devices) {
      const dev = devices[id];
      if (!dev.lastLoc) continue;
      const menit = Math.floor((Date.now() - new Date(dev.lastLoc.timestamp)) / 60000);
      const nowOnline = menit < 2;
      if (dev.online !== nowOnline) {
        dev.online = nowOnline;
        changed = true;
        if (!nowOnline) showToast(dev.nama, 'offline');
        addOrUpdateMarker(id);
      }
    }
    if (changed) { renderSidebar(); updateStats(); }
  }, 30 * 1000);

  init();
</script>
</body>
</html>
