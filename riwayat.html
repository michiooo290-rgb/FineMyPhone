<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FindMyPhone — Riwayat Lokasi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #13161d;
      --surface2: #1a1e28;
      --border: #1e2330;
      --accent: #3b82f6;
      --text: #e8eaf0;
      --muted: #6b7280;
      --online: #22c55e;
      --danger: #ef4444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* TOPBAR */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      height: 52px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .topbar-left { display: flex; align-items: center; gap: 12px; }

    .back-btn {
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
      transition: color 0.15s;
    }
    .back-btn:hover { color: var(--text); }

    .logo { font-family: 'Space Mono', monospace; font-size: 15px; font-weight: 700; }
    .logo span { color: var(--accent); }

    .page-title { font-size: 14px; font-weight: 500; color: var(--muted); }

    /* FILTER BAR */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .filter-label { font-size: 12px; color: var(--muted); }

    .btn-filter {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-filter.active {
      background: rgba(59,130,246,0.15);
      border-color: var(--accent);
      color: var(--accent);
    }
    .btn-filter:hover { border-color: var(--accent); color: var(--accent); }

    .filter-sep { width: 1px; height: 20px; background: var(--border); }

    .stat-chip {
      padding: 4px 10px;
      border-radius: 20px;
      background: var(--surface2);
      font-size: 12px;
      color: var(--muted);
    }
    .stat-chip strong { color: var(--text); }

    /* MAIN */
    .main {
      display: grid;
      grid-template-columns: 280px 1fr;
      flex: 1;
      overflow: hidden;
    }

    /* TIMELINE SIDEBAR */
    .timeline-sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .timeline-header {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .timeline-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .timeline-list::-webkit-scrollbar { width: 4px; }
    .timeline-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .tl-item {
      display: flex;
      gap: 10px;
      padding: 6px 4px;
      cursor: pointer;
      border-radius: 8px;
      transition: background 0.15s;
    }
    .tl-item:hover { background: var(--surface2); }
    .tl-item.active { background: rgba(59,130,246,0.08); }

    .tl-left {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 4px;
    }

    .tl-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .tl-line {
      width: 1px;
      flex: 1;
      background: var(--border);
      margin-top: 4px;
      min-height: 20px;
    }

    .tl-content { flex: 1; padding-bottom: 8px; }

    .tl-time {
      font-size: 11px;
      color: var(--accent);
      font-family: 'Space Mono', monospace;
      margin-bottom: 2px;
    }

    .tl-coord {
      font-size: 12px;
      color: var(--text);
      margin-bottom: 2px;
    }

    .tl-meta { font-size: 11px; color: var(--muted); }

    .empty-tl {
      padding: 24px 16px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    /* MAP */
    .map-wrap { position: relative; }

    #map { width: 100%; height: 100%; }

    .leaflet-tile-pane { filter: brightness(0.85) saturate(0.8); }
    .leaflet-popup-content-wrapper {
      background: var(--surface) !important;
      border: 1px solid var(--border) !important;
      border-radius: 10px !important;
      color: var(--text) !important;
    }
    .leaflet-popup-tip { background: var(--surface) !important; }
    .leaflet-popup-content { margin: 10px 14px !important; }

    .popup-time { font-size: 12px; font-weight: 600; margin-bottom: 4px; color: var(--accent); }
    .popup-row { font-size: 12px; color: var(--muted); margin-bottom: 2px; }
    .popup-row span { color: var(--text); font-weight: 500; }

    /* Loading */
    .loading-overlay {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 12px;
      z-index: 9999;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div style="font-size:13px;color:var(--muted)">Memuat riwayat...</div>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <a href="dashboard.html" class="back-btn">← Dashboard</a>
    <div class="logo">Find<span>My</span>Phone</div>
    <div class="page-title" id="page-title">Riwayat Lokasi</div>
  </div>
</div>

<!-- FILTER -->
<div class="filter-bar">
  <span class="filter-label">Periode:</span>
  <button class="btn-filter" onclick="setFilter(1, this)">1 Jam</button>
  <button class="btn-filter active" onclick="setFilter(24, this)">Hari ini</button>
  <button class="btn-filter" onclick="setFilter(168, this)">7 Hari</button>
  <button class="btn-filter" onclick="setFilter(720, this)">30 Hari</button>
  <div class="filter-sep"></div>
  <div class="stat-chip">Total: <strong id="stat-total">0</strong> titik</div>
  <div class="stat-chip">Jarak: <strong id="stat-jarak">0</strong> km</div>
</div>

<!-- MAIN -->
<div class="main">
  <!-- TIMELINE -->
  <div class="timeline-sidebar">
    <div class="timeline-header">Timeline pergerakan</div>
    <div class="timeline-list" id="timeline-list">
      <div class="empty-tl" id="empty-tl">Belum ada data lokasi<br>untuk periode ini.</div>
    </div>
  </div>

  <!-- MAP -->
  <div class="map-wrap">
    <div id="map"></div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://slljvmlwdnyyaowcioso.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_qWGYZVKUlBesO5FubLMDow_pB_xJi1b'
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let map, polyline, markers = [];
  let deviceId, deviceData, filterJam = 24;
  let allLocs = [];

  async function init() {
    // Cek auth
    const { data: { session } } = await db.auth.getSession();
    if (!session) return window.location.href = '/index.html';

    // Ambil device ID dari URL
    const params = new URLSearchParams(window.location.search);
    deviceId = params.get('id');

    if (!deviceId) return window.location.href = '/dashboard.html';

    // Ambil info device
    const { data: dev } = await db
      .from('devices')
      .select('*')
      .eq('id', deviceId)
      .single();

    if (!dev) return window.location.href = '/dashboard.html';

    deviceData = dev;
    document.getElementById('page-title').textContent = `Riwayat — ${dev.nama}`;
    document.title = `FindMyPhone — Riwayat ${dev.nama}`;

    // Init peta
    map = L.map('map', { zoomControl: true }).setView([0.5335, 101.45], 13);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '© CartoDB © OpenStreetMap',
      maxZoom: 19
    }).addTo(map);

    // Load data
    await loadRiwayat();

    document.getElementById('loading').style.display = 'none';
  }

  async function loadRiwayat() {
    const since = new Date(Date.now() - filterJam * 60 * 60 * 1000).toISOString();

    const { data: locs } = await db
      .from('locations')
      .select('*')
      .eq('device_id', deviceId)
      .gte('timestamp', since)
      .order('timestamp', { ascending: true });

    allLocs = locs || [];
    renderMap();
    renderTimeline();
    updateStats();
  }

  function renderMap() {
    // Hapus layer lama
    if (polyline) map.removeLayer(polyline);
    markers.forEach(m => map.removeLayer(m));
    markers = [];

    if (!allLocs.length) return;

    const points = allLocs.map(l => [l.lat, l.lng]);
    const warna = deviceData.warna_marker || '#3b82f6';

    // Garis jalur
    polyline = L.polyline(points, {
      color: warna,
      weight: 3,
      opacity: 0.7,
      dashArray: '6, 4'
    }).addTo(map);

    // Marker titik awal
    const startIcon = L.divIcon({
      className: '',
      html: `<div style="width:12px;height:12px;border-radius:50%;background:${warna};border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,0.4)"></div>`,
      iconSize: [12, 12],
      iconAnchor: [6, 6]
    });

    // Marker titik akhir (lebih besar)
    const endIcon = L.divIcon({
      className: '',
      html: `<div style="width:20px;height:20px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);background:${warna};border:2px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.4)"></div>`,
      iconSize: [20, 20],
      iconAnchor: [10, 20]
    });

    // Tambah marker tiap titik (max 100 titik supaya tidak berat)
    const step = Math.max(1, Math.floor(allLocs.length / 100));
    allLocs.forEach((loc, i) => {
      if (i % step !== 0 && i !== allLocs.length - 1) return;

      const isLast = i === allLocs.length - 1;
      const isFirst = i === 0;
      const icon = isLast ? endIcon : startIcon;

      const waktu = new Date(loc.timestamp).toLocaleString('id-ID');
      const m = L.marker([loc.lat, loc.lng], { icon })
        .bindPopup(`
          <div class="popup-time">${waktu}</div>
          <div class="popup-row">Baterai: <span>${loc.battery ?? '?'}%</span></div>
          <div class="popup-row">Akurasi: <span>±${Math.round(loc.accuracy ?? 0)}m</span></div>
          ${isFirst ? '<div style="font-size:11px;color:#22c55e;margin-top:6px">▶ Titik awal</div>' : ''}
          ${isLast ? '<div style="font-size:11px;color:#3b82f6;margin-top:6px">⬛ Titik terkini</div>' : ''}
        `)
        .addTo(map);

      markers.push(m);
    });

    // Fit bounds ke semua titik
    if (points.length > 1) {
      map.fitBounds(polyline.getBounds(), { padding: [40, 40] });
    } else {
      map.setView(points[0], 16);
    }
  }

  function renderTimeline() {
    const list = document.getElementById('timeline-list');
    const empty = document.getElementById('empty-tl');

    list.querySelectorAll('.tl-item').forEach(el => el.remove());

    if (!allLocs.length) {
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    // Tampilkan dari terbaru ke terlama
    const reversed = [...allLocs].reverse();
    const warna = deviceData.warna_marker || '#3b82f6';

    reversed.forEach((loc, i) => {
      const waktu = new Date(loc.timestamp).toLocaleTimeString('id-ID');
      const isLast = i === reversed.length - 1;

      const item = document.createElement('div');
      item.className = 'tl-item';
      item.innerHTML = `
        <div class="tl-left">
          <div class="tl-dot" style="background:${i === 0 ? warna : '#3a4055'}"></div>
          ${!isLast ? '<div class="tl-line"></div>' : ''}
        </div>
        <div class="tl-content">
          <div class="tl-time">${waktu}</div>
          <div class="tl-coord">${loc.lat.toFixed(5)}, ${loc.lng.toFixed(5)}</div>
          <div class="tl-meta">🔋 ${loc.battery ?? '?'}% · ±${Math.round(loc.accuracy ?? 0)}m</div>
        </div>
      `;

      item.addEventListener('click', () => {
        map.flyTo([loc.lat, loc.lng], 17, { duration: 0.8 });
        document.querySelectorAll('.tl-item').forEach(el => el.classList.remove('active'));
        item.classList.add('active');
      });

      list.appendChild(item);
    });
  }

  function updateStats() {
    document.getElementById('stat-total').textContent = allLocs.length;

    // Hitung total jarak (Haversine)
    let totalKm = 0;
    for (let i = 1; i < allLocs.length; i++) {
      totalKm += haversine(
        allLocs[i-1].lat, allLocs[i-1].lng,
        allLocs[i].lat, allLocs[i].lng
      );
    }
    document.getElementById('stat-jarak').textContent = totalKm.toFixed(2);
  }

  function haversine(lat1, lng1, lat2, lng2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 +
      Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  async function setFilter(jam, btn) {
    filterJam = jam;
    document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('loading').style.display = 'flex';
    await loadRiwayat();
    document.getElementById('loading').style.display = 'none';
  }

  init();
</script>
</body>
</html>
