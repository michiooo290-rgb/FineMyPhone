<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FindMyPhone — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #13161d;
      --border: #1e2330;
      --accent: #3b82f6;
      --accent-glow: rgba(59,130,246,0.15);
      --text: #e8eaf0;
      --muted: #6b7280;
      --error: #ef4444;
      --success: #22c55e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* Glow blob */
    body::after {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(59,130,246,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .container {
      width: 100%;
      max-width: 400px;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    /* Logo */
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 52px;
      height: 52px;
      background: var(--accent-glow);
      border: 1px solid rgba(59,130,246,0.3);
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
      font-size: 24px;
    }

    .logo-title {
      font-family: 'Space Mono', monospace;
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    .logo-title span { color: var(--accent); }

    .logo-sub {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
    }

    /* Tabs */
    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      background: var(--bg);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 24px;
    }

    .tab {
      padding: 8px;
      border-radius: 7px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab.active {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }

    /* Form */
    .form { display: flex; flex-direction: column; gap: 14px; }

    .field { display: flex; flex-direction: column; gap: 6px; }

    label {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }

    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }

    .btn {
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover { background: #2563eb; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-google {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 4px;
    }

    .btn-google:hover { border-color: var(--accent); background: var(--accent-glow); }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: 12px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Alert */
    .alert {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }

    .alert.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
    .alert.success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #86efac; }
    .alert.show { display: block; }

    /* Panel toggle */
    #panel-register { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="logo-icon">📍</div>
      <div class="logo-title">Find<span>My</span>Phone</div>
      <div class="logo-sub">Pantau semua HP kamu dalam satu dashboard</div>
    </div>

    <div class="card">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('login', event)">Masuk</button>
        <button class="tab" onclick="switchTab('register', event)">Daftar</button>
      </div>

      <!-- Panel Login -->
      <div id="panel-login">
        <div class="form">
          <div id="alert-login" class="alert"></div>

          <div class="field">
            <label>Email</label>
            <input type="email" id="login-email" placeholder="email@kamu.com" />
          </div>
          <div class="field">
            <label>Password</label>
            <input type="password" id="login-password" placeholder="••••••••" />
          </div>
          <button class="btn btn-primary" onclick="handleLogin()" id="btn-login">Masuk</button>

          <div class="divider">atau</div>

          <button class="btn btn-google" onclick="handleGoogle()">
            <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Masuk dengan Google
          </button>
        </div>
      </div>

      <!-- Panel Register -->
      <div id="panel-register">
        <div class="form">
          <div id="alert-register" class="alert"></div>

          <div class="field">
            <label>Nama</label>
            <input type="text" id="reg-nama" placeholder="Nama kamu" />
          </div>
          <div class="field">
            <label>Email</label>
            <input type="email" id="reg-email" placeholder="email@kamu.com" />
          </div>
          <div class="field">
            <label>Password</label>
            <input type="password" id="reg-password" placeholder="Minimal 6 karakter" />
          </div>
          <button class="btn btn-primary" onclick="handleRegister()" id="btn-register">Buat Akun</button>

          <div class="divider">atau</div>

          <button class="btn btn-google" onclick="handleGoogle()">
            <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Daftar dengan Google
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Init Supabase
    const SUPABASE_URL = 'https://slljvmlwdnyyaowcioso.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNsbGp2bWx3ZG55eWFvd2Npb3NvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NTE5NTQsImV4cCI6MjA5NjIyNzk1NH0.xMUpbkBZeVZWpMxBM1vifSzekScNJvmhaxAJrQEyG9k';
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Cek jika sudah login, langsung ke dashboard
    db.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = '/dashboard.html';
    });

    // Switch tab
    function switchTab(tab, e) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById('panel-login').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('panel-register').style.display = tab === 'register' ? 'block' : 'none';
      e.target.classList.add('active');
    }

    // Tampilkan alert
    function showAlert(id, type, msg) {
      const el = document.getElementById(id);
      el.className = `alert ${type} show`;
      el.textContent = msg;
    }

    // Login email
    async function handleLogin() {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const btn = document.getElementById('btn-login');

      if (!email || !password) return showAlert('alert-login', 'error', 'Isi email dan password dulu ya!');

      btn.disabled = true;
      btn.textContent = 'Memproses...';

      const { error } = await db.auth.signInWithPassword({ email, password });

      if (error) {
        showAlert('alert-login', 'error', 'Email atau password salah.');
        btn.disabled = false;
        btn.textContent = 'Masuk';
      } else {
        window.location.href = '/dashboard.html';
      }
    }

    // Register email
    async function handleRegister() {
      const nama = document.getElementById('reg-nama').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      const btn = document.getElementById('btn-register');

      if (!nama || !email || !password) return showAlert('alert-register', 'error', 'Semua kolom harus diisi!');
      if (password.length < 6) return showAlert('alert-register', 'error', 'Password minimal 6 karakter.');

      btn.disabled = true;
      btn.textContent = 'Memproses...';

      const { error } = await db.auth.signUp({
        email, password,
        options: { data: { nama } }
      });

      if (error) {
        showAlert('alert-register', 'error', error.message);
        btn.disabled = false;
        btn.textContent = 'Buat Akun';
      } else {
        showAlert('alert-register', 'success', 'Akun berhasil dibuat! Cek email untuk verifikasi.');
        btn.textContent = 'Cek Email';
      }
    }

    // Login Google
    async function handleGoogle() {
      await db.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin + '/dashboard.html' }
      });
    }

    // Enter key support
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const panel = document.getElementById('panel-register').style.display === 'block' ? 'register' : 'login';
        panel === 'login' ? handleLogin() : handleRegister();
      }
    });
  </script>
</body>
</html>
